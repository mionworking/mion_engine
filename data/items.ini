# Configuração de drops — altere sem recompilar.
#
# Chaves [drops]:
#   drop_chance_pct       — 0–100, probabilidade de cair item ao morrer inimigo
#   pickup_radius         — raio de apanha (unidades mundo)
#   health_bonus          — cura ao apanhar orbe de vida
#   damage_bonus          — bónus permanente de dano (orbe vermelha)
#   speed_bonus           — bónus permanente de move_speed (orbe azul)
#   lore_drop_chance_pct  — 0–100, se cair orbe de vida, chance de marcar item de narrativa

[drops]
drop_chance_pct=50
pickup_radius=36
health_bonus=22
damage_bonus=1
speed_bonus=10
lore_drop_chance_pct=8
