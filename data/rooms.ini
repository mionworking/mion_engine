# Templates de sala (alinhados a dungeon_rules::room_template_id_name).
# Por defeito ini_obstacles=0: o jogo usa os _layout_* em código (DungeonScene).
# Para definir obstáculos só por dados: ponha ini_obstacles=1 e secções
#   [tpl.obstacle.0], [tpl.obstacle.1], ...
# Coordenadas: nx1,ny1,nx2,ny2 normalizadas [0,1] no rect bounds da sala (ver room_loader.hpp).
# Arte final pode vir depois: sprite/sw/sh/anchor_* opcionais.

[rooms]
# Metadados futuros (ex.: version=1)
description=templates_alinhados_aos_layouts_hardcoded

# --- arena (template 0) ---
[arena]
ini_obstacles=0
# Exemplo activável depois:
# ini_obstacles=1
# [arena.obstacle.0]
# name=pillar_nw
# nx1=0.40
# ny1=0.35
# nx2=0.46
# ny2=0.50
# sprite=assets/props/dungeon_pillar.png
# sw=96
# sh=128
# anchor_x=0.5
# anchor_y=1.0

[corredor]
ini_obstacles=0

[cruzamento]
ini_obstacles=0

[labirinto]
ini_obstacles=0

[boss_arena]
ini_obstacles=0

[intro]
ini_obstacles=0
